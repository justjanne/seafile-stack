services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: password
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./config/pgsql/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:9.0.3
    command: --requirepass "password"
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    image: ghcr.io/justjanne/seafile-migrations:sha-46c649d
    volumes:
      - ./config/pgsql:/config
    environment:
      - SEAFILE_DB_USER=seafile
      - SEAFILE_DB_PASSWORD=password
    env_file:
      - pgsql.env
    depends_on:
      db:
        condition: service_healthy

  seafile:
    image: ghcr.io/justjanne/seafile-server:sha-666904f
    volumes:
      - seafile-data:/data
      - shared-run:/run/seafile
      - ./config/pgsql:/config
    environment:
      - SEAFILE_DB_USER=seafile
      - SEAFILE_DB_PASSWORD=password
    env_file:
      - pgsql.env
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy

  notifications:
    image: ghcr.io/justjanne/seafile-notifications:sha-e9104a8
    volumes:
      - seafile-data:/data
      - shared-run:/run/seafile
      - ./config/pgsql:/config
    environment:
      - SEAFILE_DB_USER=seafile
      - SEAFILE_DB_PASSWORD=password
    env_file:
      - pgsql.env
    ports:
      - "8083:8083"
    depends_on:
      seafile:
        condition: service_started
      db:
        condition: service_healthy

  fileserver:
    image: ghcr.io/justjanne/seafile-fileserver:sha-cfffbb5
    volumes:
      - seafile-data:/data
      - shared-run:/run/seafile
      - ./config/pgsql:/config
    environment:
      - SEAFILE_DB_USER=seafile
      - SEAFILE_DB_PASSWORD=password
    env_file:
      - pgsql.env
    ports:
      - "8082:8082"
    depends_on:
      seafile:
        condition: service_started
      db:
        condition: service_healthy

  seahub:
    image: ghcr.io/justjanne/seahub:sha-cc056db
    volumes:
      - seafile-data:/data
      - shared-run:/run/seafile
      - ./config/pgsql:/config
    environment:
      - SEAFILE_DB_USER=seahub
      - SEAFILE_DB_PASSWORD=password
    env_file:
      - pgsql.env
    ports:
      - "8000:8000"
    depends_on:
      seafile:
        condition: service_started
      db:
        condition: service_healthy

  office:
    image: ghcr.io/euro-office/documentserver:latest
    environment:
      - JWT_SECRET=52d3d4f142b34b5dbec60ab59264e5cc
    env_file:
      - pgsql.env
    ports:
      - "8080:80"

volumes:
  db-data:
  seafile-data:
  shared-run:
