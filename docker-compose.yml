services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:9.0.3
    command: --requirepass "password"
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  seafile:
    build:
      context: .
      dockerfile: seafile.dockerfile
    volumes:
      - ./config:/config
      - seafile-data:/data
      - shared-run:/run/seafile
    environment:
      - SEAFILE_DB_USER=seafile
      - SEAFILE_DB_PASSWORD=password
    env_file:
      - docker-compose.env
    ports:
      - "8082:8082"
    depends_on:
      db:
        condition: service_healthy

  seafile-notifications:
    build:
      context: seafile-notifications
      dockerfile: Dockerfile
    volumes:
      - ../config:/config
      - seafile-data:/data
      - shared-run:/run/seafile
    environment:
      - SEAFILE_DB_USER=seafile
      - SEAFILE_DB_PASSWORD=password
    env_file:
      - docker-compose.env
    ports:
      - "8083:8083"
    depends_on:
      db:
        condition: service_healthy

  seahub:
    build:
      context: seahub
      dockerfile: Dockerfile
    volumes:
      - ./config:/config
      - seafile-data:/data
      - shared-run:/run/seafile
    environment:
      - SEAFILE_DB_USER=seahub
      - SEAFILE_DB_PASSWORD=password
    env_file:
      - docker-compose.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
      seafile:
        condition: service_started

  office:
    image: ghcr.io/euro-office/documentserver:latest
    environment:
      - JWT_SECRET=52d3d4f142b34b5dbec60ab59264e5cc
    env_file:
      - docker-compose.env
    ports:
      - "8080:80"

volumes:
  pgdata:
  seafile-data:
  shared-run:
